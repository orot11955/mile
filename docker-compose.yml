services:
  postgres:
    image: postgres:16-alpine
    container_name: mile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mile}
      POSTGRES_DB: ${POSTGRES_DB:-mile}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mile-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mile-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - mile-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./mile-server
    container_name: mile-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mile}:${POSTGRES_PASSWORD:-mile}@postgres:5432/${POSTGRES_DB:-mile}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"

  web:
    build:
      context: ./mile-web
    container_name: mile-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"

volumes:
  mile-postgres-data:
  mile-redis-data:
